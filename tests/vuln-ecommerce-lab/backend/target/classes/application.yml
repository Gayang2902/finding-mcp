server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: vuln-ecommerce
  datasource:
    url: jdbc:h2:mem:vulnshopdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: VnVsbmVyYWJsZVNlY3JldEtleUZvclRlc3RpbmdPbmx5MTIzNDU2Nzg5MA==
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.vulnshop: DEBUG
    org.springframework.security: DEBUG
